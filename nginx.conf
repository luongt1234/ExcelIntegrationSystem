worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    # Cho phép upload file lớn (100MB tương đương cấu hình ở Backend)
    client_max_body_size 100M;

    server {
        # Port mà Nginx sẽ expose ra ngoài (bạn truy cập hệ thống qua port này)
        listen       8080;
        server_name  localhost;

        # ========================================================
        # 1. Proxy cho Backend API
        # Mọi request bắt đầu bằng /api/ sẽ được chuyển tiếp tới Kestrel Backend
        # ========================================================
        location /api/ {
            proxy_pass http://localhost:5055/api/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection keep-alive;
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ========================================================
        # 2. Proxy cho Frontend (Môi trường Development)
        # Chuyển tiếp tới Vite dev server. Chú ý port 5173/5174
        # ========================================================
        location / {
            proxy_pass http://localhost:5173/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade"; # Bắt buộc để Vite HMR (WebSocket) hoạt động
            proxy_set_header Host $host;
        }

        # ========================================================
        # 3. Phục vụ Frontend tĩnh (Môi trường Production)
        # Nếu bạn đã chạy `npm run build`, hãy comment Block số 2 bên trên,
        # và bỏ comment Block dưới đây.
        # ========================================================
        # location / {
        #     root   E:/project/ExcelIntegrationSystem/DataMergeWebSystem/DataMergeWeb/dist;
        #     index  index.html;
        #     # Rewrite rule bắt buộc cho React Router
        #     try_files $uri $uri/ /index.html;
        # }
    }
}
